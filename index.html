<!DOCTYPE html>
<html>
<head>
<title>WEDDING GIFTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family: 'Georgia', serif;
background-image:url('https://static.vecteezy.com/system/resources/previews/003/026/032/large_2x/bright-reflection-soft-color-background-free-photo.jpg');
background-size:cover;
background-attachment:fixed;
text-align:center;
}

body::after{
content:"✨ ✨ ✨ ✨ ✨ ✨ ✨ ✨ ✨ ✨";
position:fixed;
width:100%;
top:0;
left:0;
animation:glitter 6s linear infinite;
opacity:0.4;
font-size:20px;
}
@keyframes glitter{
0%{transform:translateY(-100%)}
100%{transform:translateY(100vh)}
}

h1{
font-size:50px;
color:#b76e79;
margin-top:30px;
}

.tabs button{
padding:12px 25px;
margin:5px;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
.tabs button:hover{background:#f8d7da;}

.section{padding:50px 20px;}
.items{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
width:230px;
padding:15px;
border-radius:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:15px;
}

.mine-btn{
background:none;
border:none;
cursor:pointer;
margin-top:10px;
}

.mine-btn img{width:120px;}
.mine-btn.disabled{
opacity:0.4;
pointer-events:none;
}

.counter{
font-weight:bold;
color:#b76e79;
}

.flower{
position:fixed;
font-size:40px;
}
.left{left:10px; top:100px;}
.right{right:10px; top:200px;}
</style>

<script>
let counters = {};

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function chooseGift(btn, giftName, unlimited=false){
let nickname = prompt("Enter your nickname:");
if(!nickname) return;

if(confirm("Are you sure you want " + giftName + " as your wedding gift?")){
if(unlimited){
if(!counters[giftName]) counters[giftName]=0;
counters[giftName]++;
btn.parentElement.querySelector(".counter").innerText = counters[giftName];
}else{
btn.classList.add("disabled");
}
alert("Thank you, " + nickname + " 💖");
}
}
</script>

</head>
<body>

<div class="flower left">🌸</div>
<div class="flower right">🌺</div>

<h1>💍 WEDDING GIFTS 💍</h1>

<div class="tabs">
<button onclick="scrollToSection('appliances')">APPLIANCES</button>
<button onclick="scrollToSection('kitchen')">KITCHEN ESSENTIALS</button>
<button onclick="scrollToSection('home')">HOME & LIVING</button>
<button onclick="scrollToSection('others')">OTHERS</button>
</div>

<!-- APPLIANCES -->
<div class="section" id="appliances">
<h2>✨ APPLIANCES ✨</h2>
<div class="items">

<!-- Appliances List -->
<script>
let appliances = [
["Rice Cooker","https://www.haegergroup.com/wp-content/uploads/RC-18L.001A_1-1.jpg"],
["Electric Kettle","https://media-v4.edamama.ph/products/1_1720441969578.jpg"],
["Kettle","https://zbga.shopsuki.ph/cdn/shop/files/masflex-stainless-steel-whistling-kettle-3.0L_1024x.png?v=1713234628"],
["Blender","https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgxfbI7OC-vISlN6hPPeqfU_cEHK_4WCOnkQ&s"],
["Toaster","https://smegphilippines.com/cdn/shop/files/TSF01CRPH_2.png?v=1722823126"],
["TV","https://s3.infra.brandquad.io/accounts-media/SHRP/DAM/origin/5ed1ddf8-4e73-11ef-a427-bea7e36404f4.jpg"],
["REF","https://www.smappliance.com/cdn/shop/products/Fujidenzo-RDD35TLeft-10163302_800x.jpg?v=1619154244"]
];

document.write(appliances.map(item => `
<div class="card">
<img src="${item[1]}">
<p>${item[0]}</p>
<button class="mine-btn" onclick="chooseGift(this,'${item[0]}')">
<img src="https://png.pngtree.com/png-clipart/20241216/original/pngtree-mine-red-button-png-image_17922819.png">
</button>
</div>
`).join(""));
</script>

</div>
</div>

<!-- KITCHEN ESSENTIALS -->
<div class="section" id="kitchen">
<h2>🍽️ KITCHEN ESSENTIALS 🍽️</h2>
<div class="items">

<script>
let kitchen = [
["Plates","https://m.media-amazon.com/images/I/71K6TzFzn4L._AC_SL1000__.jpg"],
["Spoon and Fork","https://img.lazcdn.com/g/p/167bae1a76a61c84fa475c03fa45f484.jpg_720x720q80.jpg"],
["Bowls","https://www.hawkinsnewyork.com/cdn/shop/files/essential-dinnerware-large-bowl-group-HNY.500.10.063_80416ab5-a919-4fef-bfd1-8a4ccc7be48a.jpg?v=1727812189&width=1440"],
["Cups / Mugs","https://m.media-amazon.com/images/I/61sXTBE4bFL.jpg"],
["Tumblers","https://cdn.thewirecutter.com/wp-content/media/2024/04/tumblers-2048px-8243-3x2-1.jpg?auto=webp&quality=75&crop=1:1,smart&width=1024"],
["Cooking Pots / Pans","https://images.yummy.ph/yummy/uploads/2016/04/potspans-640-v2-2.jpg"],
["Cutting Boards","https://ecowarriorph.com/wp-content/uploads/2021/10/chopping-board-scaled.jpg"],
["Knives","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Cucina_012.jpg/500px-Cucina_012.jpg"],
["Glass Food Containers","https://rampagecity.ph/cdn/shop/products/PRE_3_2048x.jpg?v=1716170789"],
["Thermos","https://shopsuki.ph/cdn/shop/files/1234603253283_1024x.png?v=1715927748"],
["Coffee / Tea Set","https://cdn20.pamono.com/p/g/1/8/1816587_57j2w408bx/antique-french-porcelain-coffee-tea-set-1865-set-of-13-1.jpg"]
];

document.write(kitchen.map(item => `
<div class="card">
<img src="${item[1]}">
<p>${item[0]}</p>
<button class="mine-btn" onclick="chooseGift(this,'${item[0]}')">
<img src="https://png.pngtree.com/png-clipart/20241216/original/pngtree-mine-red-button-png-image_17922819.png">

`).join(""));
</script>

</div>
</div>

<!-- HOME & LIVING -->
<div class="section" id="home">
<h2>🏠 HOME & LIVING 🏠</h2>
<div class="items">

<script>
let home = [
["Throw Pillow","https://smhome.ph/cdn/shop/files/TEXTURED_20_28RECTANGLES_29_20THROW_20PILLOW_20GREY_20-_2010434835-2.jpg?v=1771041144"],
["Blanket","https://digitalcontent.api.tesco.com/v2/media/marketplace/630aed07-38ca-48f5-9a24-167340eef4a3/v5blsYUr8_TKmWrBW0qwI8edk_1317963157.jpeg?h=960&w=960"],
["Wall Clock","https://smhome.ph/cdn/shop/files/JP_20NETWORKS_20INC_20LUCENT_20WC_C2_A0_20-_2039212829-1.jpg?v=1759809869"],
["Photo / Picture Frames","https://picturecity.ph/cdn/shop/products/ELEGANTFRAMES_ELIZABETH.jpg?v=1639967117"],
["Scented Candles","https://www.prosperitycandle.com/cdn/shop/products/Spa_Candles_Lifestyle_12x8_041019.jpg?v=1620912712"],
["Bath Towels","https://www.nitori.com.ph/cdn/shop/files/777188401_700x700.jpg?v=1731915646"],
["Mirrors","https://www.ikea.com/us/en/images/products/svansele-mirror-gold__0898210_pe813213_s5.jpg?f=s"],
["Bags","https://blog.fashionphile.com/wp-content/uploads/2022/10/Hero-7.jpg"],
["Lotion","https://www.suave.com/cdn/shop/files/92407772-81095471-lotion.png.rendition.767.767_1000x.png?v=1698337967"],
["Wallet","https://img.lazcdn.com/g/p/0a31959509b4bfe40bbd2ddc7ce4a80d.jpg_720x720q80.jpg"]
];

document.write(home.map(item => `
<div class="card">
<img src="${item[1]}">
<p>${item[0]}</p>
<button class="mine-btn" onclick="chooseGift(this,'${item[0]}')">
<img src="https://png.pngtree.com/png-clipart/20241216/original/pngtree-mine-red-button-png-image_17922819.png">
</button>
</div>

</script>

</div>
</div>

<!-- OTHERS -->
<div class="section" id="others">
<h2>🌷 OTHERS 🌷</h2>
<div class="items">

<script>
let others = [
["Goods","https://katanamrp.com/wp-content/uploads/2022/11/consumer-goods-min.jpg"],
["Cash Gift","https://una-acctg.com/wp-content/uploads/2022/12/Christmas-bonus-A-rewarding-guide-to-employee-bonuses-scaled.jpg"],
["Gift Card / Voucher","https://d3pyarv4eotqu4.cloudfront.net/clicktopr/images/product/WALL_CALENDAR_GIFT_VOUCHER_3_5X2_07245702202401.jpg"]
];

document.write(others.map(item => `
<div class="card">
<img src="${item[1]}">
<p>${item[0]}</p>
<button class="mine-btn" onclick="chooseGift(this,'${item[0]}',true)">
<img src="https://png.pngtree.com/png-clipart/20241216/original/pngtree-mine-red-button-png-image_17922819.png">
</button>
<p class="counter">0</p>
</div>
`).join(""));
</script>

</div>
</div>

</body>
</html>
