<!DOCTYPE html>
<html>
<head>
<title>WEDDING GIFTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f3f3f3;
text-align:center;
}

/* Title */
h1{
margin:40px 0;
font-size:40px;
letter-spacing:3px;
}

/* Tabs */
.tabs button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.tabs button:hover{
transform:translateY(-3px);
}

/* Sections */
.section{
padding:40px 20px;
}

/* Grid */
.items{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

/* CARD STYLE LIKE YOUR IMAGE */
.card{
width:260px;
background:#e9e9e9;
border:6px solid #e6007e;
border-radius:40px;
padding:25px;
transition:0.4s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card:hover{
transform:translateY(-15px);
box-shadow:0 20px 35px rgba(0,0,0,0.25);
}

/* Image */
.card img{
width:100%;
height:180px;
object-fit:contain;
background:white;
border-radius:25px;
padding:10px;
}

/* Item name */
.card h3{
font-size:28px;
margin:20px 0;
font-weight:800;
}

/* Pink gradient button */
.mine-btn{
padding:12px 30px;
border:none;
border-radius:15px;
background:linear-gradient(to bottom,#ff4db8,#cc007a);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.mine-btn:hover{
transform:scale(1.08);
}

.mine-btn.disabled{
background:gray;
pointer-events:none;
opacity:0.6;
}

.counter{
margin-top:8px;
font-weight:bold;
color:#e6007e;
}
</style>

<script>
let counters = {};

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function chooseGift(btn, giftName, unlimited=false){
let nickname = prompt("Enter your nickname:");
if(!nickname) return;

if(confirm("Are you sure you want " + giftName + " as your wedding gift?")){
if(unlimited){
if(!counters[giftName]) counters[giftName]=0;
counters[giftName]++;
btn.parentElement.querySelector(".counter").innerText = counters[giftName];
}else{
btn.classList.add("disabled");
}
alert("Thank you, " + nickname + " 💖");
}
}
</script>

</head>
<body>

<h1>WEDDING GIFTS</h1>

<div class="tabs">
<button onclick="scrollToSection('appliances')">APPLIANCES</button>
<button onclick="scrollToSection('kitchen')">KITCHEN</button>
<button onclick="scrollToSection('home')">HOME</button>
<button onclick="scrollToSection('others')">OTHERS</button>
</div>

<!-- Example Section -->
<div class="section" id="appliances">
<h2>APPLIANCES</h2>
<div class="items">

<div class="card">
<img src="https://www.haegergroup.com/wp-content/uploads/RC-18L.001A_1-1.jpg">
<h3>Rice Cooker</h3>
<button class="mine-btn" onclick="chooseGift(this,'Rice Cooker')">MINE</button>
</div>

<div class="card">
<img src="https://media-v4.edamama.ph/products/1_1720441969578.jpg">
<h3>Electric Kettle</h3>
<button class="mine-btn" onclick="chooseGift(this,'Electric Kettle')">MINE</button>
</div>

</div>
</div>

</body>
</html>
