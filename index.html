<!DOCTYPE html>
<html>
<head>
<title>WEDDING GIFTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
text-align:center;
}

h1{
margin:40px 0;
font-size:42px;
letter-spacing:3px;
}

.tabs button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.tabs button:hover{
transform:translateY(-3px);
}

.section{
padding:50px 20px;
}

.items{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

/* CARD STYLE */
.card{
width:260px;
background:#e9e9e9;
border:6px solid #e6007e;
border-radius:40px;
padding:25px;
transition:0.4s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card:hover{
transform:translateY(-15px);
box-shadow:0 20px 35px rgba(0,0,0,0.25);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
background:white;
border-radius:25px;
padding:10px;
}

.card h3{
font-size:22px;
margin:20px 0;
font-weight:800;
}

.mine-btn{
padding:12px 30px;
border:none;
border-radius:15px;
background:linear-gradient(to bottom,#ff4db8,#cc007a);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.mine-btn:hover{
transform:scale(1.08);
}

.mine-btn.disabled{
background:gray;
pointer-events:none;
opacity:0.6;
}

.counter{
margin-top:8px;
font-weight:bold;
color:#e6007e;
}
</style>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.15.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.15.0/firebase-firestore.js";

// ----------------------
// Your Firebase config
// ----------------------
const firebaseConfig = {
  apiKey: "AIzaSyDEdTJpJHN80Zbp6aw-yQpQpRyOtoZ4PM4",
  authDomain: "gift-selection-fa5a1.firebaseapp.com",
  projectId: "gift-selection-fa5a1",
  storageBucket: "gift-selection-fa5a1.appspot.com",
  messagingSenderId: "922467707552",
  appId: "1:922467707552:web:f6ceaef51e3d874baa37c5"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Scroll to section
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// ----------------------
// Gift selection function
// ----------------------
function chooseGift(btn, giftName, unlimited=false){
  let nickname = prompt("Enter your nickname:");
  if(!nickname) return;

  if(confirm("Are you sure you want " + giftName + " as your wedding gift?")){
    const giftRef = doc(db, "gifts", giftName.replace(/[.,]/g,'')); // remove commas/dots for Firestore
    
    if(unlimited){
      // Increment count
      updateDoc(giftRef, { count: increment(1) });
    } else {
      // Set taken = true
      updateDoc(giftRef, { taken: true });
    }

    alert("Thank you, " + nickname + " 💖");
  }
}

// ----------------------
// Initialize gift buttons & live updates
// ----------------------
function createGifts(){
  const data = {
    appliances: [
      ["Electric Iron","https://shop.union.ph/cdn/shop/products/UGFI-300-qtr-1_1200x1200.jpg?v=1688537291", false]
    ],
    kitchen: [
      ["Cups Mugs","https://m.media-amazon.com/images/I/61sXTBE4bFL.jpg", false],
      ["Cooking Pots Pans","https://images.yummy.ph/yummy/uploads/2016/04/potspans-640-v2-2.jpg", false],
      ["Coffee Tea Set","https://cdn20.pamono.com/p/g/1/8/1816587_57j2w408bx/antique-french-porcelain-coffee-tea-set-1865-set-of-13-1.jpg", false]
    ],
    home: [
      ["Photo Picture Frames","https://picturecity.ph/cdn/shop/products/ELEGANTFRAMES_ELIZABETH.jpg?v=1639967117", false],
      ["Ironing Board","https://i.ebayimg.com/images/g/muwAAeSwrdhoz3iL/s-l1200.jpg", false]
    ],
    others: [
      ["Gift Card Voucher","https://d3pyarv4eotqu4.cloudfront.net/clicktopr/images/product/WALL_CALENDAR_GIFT_VOUCHER_3_5X2_07245702202401.jpg", true]
    ]
  };

  for(let category in data){
    const section = document.createElement('div');
    section.className = 'section';
    section.id = category;
    section.innerHTML = `<h2>${category.toUpperCase()}</h2><div class="items"></div>`;
    document.body.appendChild(section);

    const itemsDiv = section.querySelector('.items');

    data[category].forEach(item=>{
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${item[1]}">
        <h3>${item[0]}</h3>
        <button class="mine-btn">MINE</button>
        ${item[2] ? '<div class="counter">0</div>' : ''}
      `;
      itemsDiv.appendChild(card);

      const btn = card.querySelector('button');

      // ----------------------
      // Real-time listener
      // ----------------------
      const giftRef = doc(db, "gifts", item[0].replace(/[.,]/g,''));

      onSnapshot(giftRef, (docSnap)=>{
        if(docSnap.exists()){
          const data = docSnap.data();
          if(item[2]){
            card.querySelector('.counter').innerText = data.count || 0;
          } else if(data.taken){
            btn.classList.add('disabled');
          }
        }
      });

      // Button click
      btn.addEventListener('click', ()=> chooseGift(btn, item[0], item[2]));
    });
  }
}

createGifts();

</script>

<div class="tabs">
<button onclick="scrollToSection('appliances')">APPLIANCES</button>
<button onclick="scrollToSection('kitchen')">KITCHEN ESSENTIALS</button>
<button onclick="scrollToSection('home')">HOME & LIVING</button>
<button onclick="scrollToSection('others')">OTHERS</button>
</div>

</body>
</html>
