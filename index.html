<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>WEDDING GIFTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:url('https://static.vecteezy.com/system/resources/previews/003/026/032/large_2x/bright-reflection-soft-color-background-free-photo.jpg');
  background-size:cover;
}

/* Header */
.header{
  text-align:center;
  padding:25px;
  font-size:34px;
  font-weight:700;
  color:#d63384;
  letter-spacing:2px;
}

/* Tabs */
.tabs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}
.tab{
  padding:10px 22px;
  background:#fff;
  border-radius:25px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:.2s;
}
.tab.active{
  background:#d63384;
  color:#fff;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:20px 40px 60px;
}

/* Card */
.card{
  background:white;
  border-radius:30px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px);
}

.card img.item-img{
  width:100%;
  height:170px;
  object-fit:contain;
}

.mine-btn{
  margin-top:15px;
  width:130px;
  cursor:pointer;
  transition:.2s;
}
.mine-btn:hover{
  transform:scale(1.05);
}
.mine-btn.disabled{
  filter:grayscale(100%);
  pointer-events:none;
  opacity:.55;
}

.counter{
  font-weight:700;
  color:#d63384;
  margin-top:6px;
  font-size:18px;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.modal-box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:320px;
  text-align:center;
  animation:pop .25s ease;
}
@keyframes pop{
  from{transform:scale(.8);opacity:0}
  to{transform:scale(1);opacity:1}
}
.modal input{
  width:100%;
  padding:10px;
  margin:12px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
.modal button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#d63384;
  color:white;
  font-weight:600;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="header">💍 WEDDING GIFTS 💍</div>
<div class="tabs" id="tabs"></div>
<div class="grid" id="grid"></div>

<!-- Modal -->

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <input id="nickname" placeholder="Enter your nickname">
    <button onclick="confirmGift()">Confirm</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyDEdTJpJHN80Zbp6aw-yQpQpRyOtoZ4PM4",
  authDomain: "gift-selection-fa5a1.firebaseapp.com",
  databaseURL: "https://gift-selection-fa5a1-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gift-selection-fa5a1",
  storageBucket: "gift-selection-fa5a1.firebasestorage.app",
  messagingSenderId: "922467707552",
  appId: "1:922467707552:web:f6ceaef51e3d874baa37c5",
  measurementId: "G-Q4JD2Q44B7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const mineBtnImg="https://png.pngtree.com/png-clipart/20241216/original/pngtree-mine-red-button-png-image_17922819.png";

let selectedGift=null;

/* ================= DATA ================= */

const categories={
"APPLIANCES":[
["Rice Cooker","rice_cooker","https://www.haegergroup.com/wp-content/uploads/RC-18L.001A_1-1.jpg"],
["Electric Kettle","electric_kettle","https://media-v4.edamama.ph/products/1_1720441969578.jpg"],
["Kettle","kettle","https://zbga.shopsuki.ph/cdn/shop/files/masflex-stainless-steel-whistling-kettle-3.0L_1024x.png?v=1713234628"],
["Blender","blender","https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgxfbI7OC-vISlN6hPPeqfU_cEHK_4WCOnkQ&s"],
["Toaster","toaster","https://smegphilippines.com/cdn/shop/files/TSF01CRPH_2.png?v=1722823126"],
["TV","tv","https://s3.infra.brandquad.io/accounts-media/SHRP/DAM/origin/5ed1ddf8-4e73-11ef-a427-bea7e36404f4.jpg"],
["REF","ref","https://www.smappliance.com/cdn/shop/products/Fujidenzo-RDD35TLeft-10163302_800x.jpg?v=1619154244"],
["Electric Iron","electric_iron","https://shop.union.ph/cdn/shop/products/UGFI-300-qtr-1_1200x1200.jpg?v=1688537291"]
],

"KITCHEN ESSENTIALS":[
["Plates","plates","https://m.media-amazon.com/images/I/71K6TzFzn4L._AC_SL1000__.jpg"],
["Spoon and Fork","spoon_fork","https://img.lazcdn.com/g/p/167bae1a76a61c84fa475c03fa45f484.jpg_720x720q80.jpg"],
["Bowls","bowls","https://www.hawkinsnewyork.com/cdn/shop/files/essential-dinnerware-large-bowl-group-HNY.500.10.063_80416ab5-a919-4fef-bfd1-8a4ccc7be48a.jpg?v=1727812189&width=1440"],
["Cups, Mugs","cups","https://m.media-amazon.com/images/I/61sXTBE4bFL.jpg"],
["Tumblers","tumblers","https://cdn.thewirecutter.com/wp-content/media/2024/04/tumblers-2048px-8243-3x2-1.jpg"],
["Cooking Pots, Pans","pots","https://images.yummy.ph/yummy/uploads/2016/04/potspans-640-v2-2.jpg"],
["Cutting Boards","boards","https://ecowarriorph.com/wp-content/uploads/2021/10/chopping-board-scaled.jpg"],
["Knives","knives","https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Cucina_012.jpg/500px-Cucina_012.jpg"],
["Glass Food Containers","containers","https://rampagecity.ph/cdn/shop/products/PRE_3_2048x.jpg?v=1716170789"],
["Thermos","thermos","https://shopsuki.ph/cdn/shop/files/1234603253283_1024x.png?v=1715927748"],
["Coffee, Tea Set","tea_set","https://cdn20.pamono.com/p/g/1/8/1816587_57j2w408bx/antique-french-porcelain-coffee-tea-set-1865-set-of-13-1.jpg"]
],

"HOME & LIVING":[
["Throw Pillow","pillow","https://smhome.ph/cdn/shop/files/TEXTURED_20_28RECTANGLES_29_20THROW_20PILLOW_20GREY_20-_2010434835-2.jpg"],
["Blanket","blanket","https://digitalcontent.api.tesco.com/v2/media/marketplace/630aed07-38ca-48f5-9a24-167340eef4a3/v5blsYUr8_TKmWrBW0qwI8edk_1317963157.jpeg"],
["Wall Clock","clock","https://smhome.ph/cdn/shop/files/JP_20NETWORKS_20INC_20LUCENT_20WC_C2_A0_20-_2039212829-1.jpg"],
["Photo Frames","frames","https://picturecity.ph/cdn/shop/products/ELEGANTFRAMES_ELIZABETH.jpg"],
["Scented Candles","candles","https://www.prosperitycandle.com/cdn/shop/products/Spa_Candles_Lifestyle_12x8_041019.jpg"],
["Bath Towels","towels","https://www.nitori.com.ph/cdn/shop/files/777188401_700x700.jpg"],
["Mirrors","mirrors","https://www.ikea.com/us/en/images/products/svansele-mirror-gold__0898210_pe813213_s5.jpg"],
["Bags","bags","https://blog.fashionphile.com/wp-content/uploads/2022/10/Hero-7.jpg"],
["Lotion","lotion","https://www.suave.com/cdn/shop/files/92407772-81095471-lotion.png.rendition.767.767_1000x.png"],
["Wallet","wallet","https://img.lazcdn.com/g/p/0a31959509b4bfe40bbd2ddc7ce4a80d.jpg_720x720q80.jpg"],
["Ironing Board","ironing_board","https://i.ebayimg.com/images/g/muwAAeSwrdhoz3iL/s-l1200.jpg"]
],

"OTHERS":[
["Goods","goods","https://katanamrp.com/wp-content/uploads/2022/11/consumer-goods-min.jpg"],
["Cash Gift","cash","https://una-acctg.com/wp-content/uploads/2022/12/Christmas-bonus-A-rewarding-guide-to-employee-bonuses-scaled.jpg"],
["Gift Card, Voucher","voucher","https://d3pyarv4eotqu4.cloudfront.net/clicktopr/images/product/WALL_CALENDAR_GIFT_VOUCHER_3_5X2_07245702202401.jpg"]
]
};

/* ================= UI ================= */

const tabsEl=document.getElementById("tabs");
const gridEl=document.getElementById("grid");

Object.keys(categories).forEach((cat,i)=>{
  const t=document.createElement("div");
  t.className="tab"+(i===0?" active":"");
  t.textContent=cat;
  t.onclick=()=>showCategory(cat,t);
  tabsEl.appendChild(t);
});

function showCategory(cat,tabEl){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  tabEl.classList.add("active");
  gridEl.innerHTML="";

  categories[cat].forEach(([name,id,img])=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img class="item-img" src="${img}">
      <h3>${name}</h3>
      <img class="mine-btn" id="btn-${id}" src="${mineBtnImg}">
      ${cat==="OTHERS"?`<div class="counter" id="count-${id}">0</div>`:""}
    `;

    card.querySelector(".mine-btn").onclick=()=>openModal(cat,id,name);
    gridEl.appendChild(card);
    listenRealtime(cat,id);
  });
}

showCategory("APPLIANCES",document.querySelector(".tab"));

/* ================= MODAL ================= */

const modal=document.getElementById("modal");
const nicknameInput=document.getElementById("nickname");

function openModal(cat,id,name){
  selectedGift={cat,id,name};
  document.getElementById("modalTitle").textContent=`Get ${name}?`;
  modal.style.display="flex";
}

window.confirmGift=async function(){
  const nick=nicknameInput.value.trim();
  if(!nick) return alert("Enter nickname");

  const {cat,id}=selectedGift;

  if(cat==="OTHERS"){
    const r=ref(db,"others/"+id);
    const snap=await get(r);
    const count=snap.exists()?snap.val().count||0:0;
    await update(r,{count:count+1});
  }else{
    const r=ref(db,"gifts/"+id);
    const snap=await get(r);
    if(snap.exists()) return alert("Already taken!");
    await set(r,{claimed:true,claimedBy:nick});
  }

  modal.style.display="none";
  nicknameInput.value="";
};

/* ================= REALTIME ================= */

function listenRealtime(cat,id){
  if(cat==="OTHERS"){
    onValue(ref(db,"others/"+id),(snap)=>{
      const count=snap.exists()?snap.val().count||0:0;
      const el=document.getElementById("count-"+id);
      if(el) el.textContent=count;
    });
  }else{
    onValue(ref(db,"gifts/"+id),(snap)=>{
      if(snap.exists()){
        const btn=document.getElementById("btn-"+id);
        if(btn) btn.classList.add("disabled");
      }
    });
  }
}
</script>

</body>
</html>
