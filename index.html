<!DOCTYPE html>
<html>
<head>
<title>WEDDING GIFTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
text-align:center;
}

h1{
margin:40px 0;
font-size:42px;
letter-spacing:3px;
}

.tabs button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:30px;
background:white;
cursor:pointer;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.tabs button:hover{
transform:translateY(-3px);
}

.section{
padding:50px 20px;
}

.items{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

/* CARD STYLE */
.card{
width:260px;
background:#e9e9e9;
border:6px solid #e6007e;
border-radius:40px;
padding:25px;
transition:0.4s ease;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card:hover{
transform:translateY(-15px);
box-shadow:0 20px 35px rgba(0,0,0,0.25);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
background:white;
border-radius:25px;
padding:10px;
}

.card h3{
font-size:22px;
margin:20px 0;
font-weight:800;
}

.mine-btn{
padding:12px 30px;
border:none;
border-radius:15px;
background:linear-gradient(to bottom,#ff4db8,#cc007a);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.mine-btn:hover{
transform:scale(1.08);
}

.mine-btn.disabled{
background:gray;
pointer-events:none;
opacity:0.6;
}

.counter{
margin-top:8px;
font-weight:bold;
color:#e6007e;
}
</style>

<script>
let counters = {};

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

function chooseGift(btn, giftName, unlimited=false){
let nickname = prompt("Enter your nickname:");
if(!nickname) return;

if(confirm("Are you sure you want " + giftName + " as your wedding gift?")){
if(unlimited){
if(!counters[giftName]) counters[giftName]=0;
counters[giftName]++;
btn.parentElement.querySelector(".counter").innerText = counters[giftName];
}else{
btn.classList.add("disabled");
}
alert("Thank you, " + nickname + " 💖");
}
}
</script>

</head>
<body>

<h1>WEDDING GIFTS</h1>

<div class="tabs">
<button onclick="scrollToSection('appliances')">APPLIANCES</button>
<button onclick="scrollToSection('kitchen')">KITCHEN ESSENTIALS</button>
<button onclick="scrollToSection('home')">HOME & LIVING</button>
<button onclick="scrollToSection('others')">OTHERS</button>
</div>

<script>

],

kitchen: [

],

["Gift Card or Voucher","https://d3pyarv4eotqu4.cloudfront.net/clicktopr/images/product/WALL_CALENDAR_GIFT_VOUCHER_3_5X2_07245702202401.jpg"]
]
};

for(let category in data){
document.write(`<div class="section" id="${category}">
<h2>${category.toUpperCase()}</h2>
<div class="items">`);

data[category].forEach(item=>{
let unlimited = category === "others";
document.write(`
<div class="card">
<img src="${item[1]}">
<h3>${item[0]}</h3>
<button class="mine-btn" data-name="${item[0]}" onclick="chooseGift(this,'${item[0]}',${unlimited})">MINE</button>
${unlimited ? '<div class="counter">0</div>' : ''}
</div>
`);
});

document.write(`</div></div>`);
}
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Updated chooseGift function
window.chooseGift = function(button, name, unlimited){
  const giftRef = ref(db, "gifts/" + name);

  if(unlimited){
    onValue(giftRef, (snapshot)=>{
      let current = snapshot.val() || 0;
      set(giftRef, current + 1);
    }, {onlyOnce:true});
  } else {
    set(giftRef, true);
  }
};

// Real-time listener for all buttons
const giftsRef = ref(db, "gifts");

onValue(giftsRef, (snapshot) => {
  const data = snapshot.val();
  if(!data) return;

  document.querySelectorAll(".mine-btn").forEach(btn => {
    const name = btn.getAttribute("data-name");

    if(data[name] === true){
      btn.classList.add("disabled");
      btn.disabled = true; // prevent clicking
    } else {
      btn.classList.remove("disabled");
      btn.disabled = false;
    }
  });
});
</script>
</body>
</html>
