<!DOCTYPE html>
<html>
<head>
  <title>WEDDING GIFTS</title>
  <style>
    body {
      font-family: Arial;
      background: url('https://static.vecteezy.com/system/resources/previews/003/026/032/large_2x/bright-reflection-soft-color-background-free-photo.jpg') no-repeat center center fixed;
      background-size: cover;
      text-align: center;
    }
    .tab {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background: #f0f0f0;
      cursor: pointer;
      border-radius: 5px;
    }
    .tab.active { background: #ccc; }
    .gift { display: inline-block; margin: 15px; text-align: center; }
    .gift img { width: 150px; height: 150px; display: block; margin-bottom: 5px; }
    .gift button { border: none; background: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎁 Wedding Gifts</h1>
  <div id="tabs"></div>
  <div id="gifts"></div>

  <script>
    const tabsData = {
      "APPLIANCES": [
        { name: "Rice Cooker", img: "https://www.haegergroup.com/wp-content/uploads/RC-18L.001A_1-1.jpg" },
        { name: "Electric Kettle", img: "https://media-v4.edamama.ph/products/1_1720441969578.jpg" }
        // add the rest here...
      ],
      "KITCHEN ESSENTIALS": [
        { name: "Plates", img: "https://m.media-amazon.com/images/I/71K6TzFzn4L._AC_SL1000__.jpg" }
        // add the rest here...
      ],
      "HOME & LIVING": [
        { name: "Throw Pillow", img: "https://smhome.ph/cdn/shop/files/TEXTURED_20_28RECTANGLES_29_20THROW_20PILLOW_20GREY_20-_2010434835-2.jpg?v=1771041144" }
        // add the rest here...
      ],
      "OTHERS": [
        { name: "Goods", img: "https://katanamrp.com/wp-content/uploads/2022/11/consumer-goods-min.jpg" }
        // add the rest here...
      ]
    };

    const buttons = {
      mine: "https://png.pngtree.com/png-clipart/20241216/original/pngtree-mine-red-button-png-image_17922819.png",
      claimed: "https://previews.123rf.com/images/newdesignillustrations/newdesignillustrations1812/newdesignillustrations181209758/126711787-claim-stamp-seal-print-with-rubber-print-style-and-double-framed-rectangle-shape-stamp-is-placed-on.jpg"
    };

    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSf8VULMMNmav4QIJ4szyiDgBTyrv2rpWstADzBJstloolva1A/viewform?usp=publish-editor";
    const webAppURL = "https://script.google.com/macros/s/AKfycbxuqISELQboJOyEoOhFzWDw-R8NDMMx4gLt-7QR3YAeqvjG9NVzYZqyysfnDZnj_kiE/exec";

    const tabsDiv = document.getElementById("tabs");
    const giftsDiv = document.getElementById("gifts");
    let claimedGifts = [];

    // create tabs
    Object.keys(tabsData).forEach((tabName, idx) => {
      const tab = document.createElement("div");
      tab.className = "tab" + (idx===0?" active":"");
      tab.textContent = tabName;
      tab.onclick = () => { showTab(tabName); };
      tabsDiv.appendChild(tab);
    });

    // fetch claimed gifts from Web App
    fetch(webAppURL)
      .then(res => res.json())
      .then(data => {
        claimedGifts = data.map(item => item.giftName || item); // support objects or strings
        showTab(Object.keys(tabsData)[0]);
      });

    function showTab(tabName) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      [...tabsDiv.children].forEach(t => { if(t.textContent===tabName) t.classList.add("active"); });

      giftsDiv.innerHTML = "";
      tabsData[tabName].forEach(gift => {
        const giftDiv = document.createElement("div");
        giftDiv.className = "gift";

        const img = document.createElement("img");
        img.src = gift.img;

        const btn = document.createElement("button");
        const isClaimed = claimedGifts.includes(gift.name);
        btn.innerHTML = `<img src="${isClaimed ? buttons.claimed : buttons.mine}" width="100">`;
        if(!isClaimed) {
          btn.onclick = () => window.open(formURL,"_blank");
        }

        giftDiv.appendChild(img);
        giftDiv.appendChild(btn);
        giftsDiv.appendChild(giftDiv);
      });
    }
  </script>
</body>
</html>
